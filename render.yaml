services:
  - type: web
    name: ozi-astana
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python ozi_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BRIDGE_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
